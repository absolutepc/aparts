<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — Dune Base</title>
  <link rel="stylesheet" href="css/style.css">
  <style>#page-transition{position:fixed;inset:0;z-index:10000;background:#12080b}body.page-transition-active>:not(#page-transition){visibility:hidden}</style>
</head>
<body class="page-transition-active">
  <div id="page-transition" class="page-transition" role="status" aria-live="polite" aria-label="Загрузка">
    <div class="page-transition__inner">
      <div class="page-transition__logo"><img src="img/logo.svg" alt=""></div>
      <p class="page-transition__label">Админ-панель</p>
      <div class="page-transition__progress" aria-hidden="true"><span class="page-transition__progress-bar"></span></div>
    </div>
  </div>
  <script src="js/transition-boot.js"></script>

  <div id="site-header"></div>

  <main>
    <div id="adminGate" style="display:none;min-height:60vh;align-items:center;justify-content:center;padding:40px">
      <div class="auth-form">
        <h2>Вход для администратора</h2>
        <p class="subtitle">Введите учётные данные администратора</p>
        <form id="adminLoginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required value="admin@dunebase.ru">
          </div>
          <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Войти</button>
        </form>
        <p style="margin-top:16px;font-size:0.8rem;color:var(--text-muted);text-align:center">
        </p>
      </div>
    </div>

    <div id="adminPanel" class="admin-layout" style="display:none">
      <aside class="admin-sidebar">
        <h2>⚡ Админ-панель</h2>
        <nav class="admin-nav">
          <button class="active" data-section="properties">🏠 Объекты</button>
          <button data-section="dashboard">📊 Обзор</button>
        </nav>
        <div style="padding:12px;margin-top:24px;display:flex;flex-direction:column;gap:8px">
          <a href="index.html" class="btn btn-secondary btn-sm" style="text-align:center">← На сайт</a>
          <button class="btn btn-secondary btn-sm" id="adminLogoutBtn">Выйти</button>
        </div>
      </aside>
      <div class="admin-main" id="adminContent"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js?v=34"></script>
  <script src="js/app.js"></script>
  <script src="js/transition.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/admin.js"></script>
  <script>
    initLayout('admin');
    initAdmin();
  </script>
</body>
</html>
