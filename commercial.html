<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Коммерческая недвижимость — Dune Base</title>
  <link rel="stylesheet" href="css/style.css">
  <style>#page-transition{position:fixed;inset:0;z-index:10000;background:#12080b}body.page-transition-active>:not(#page-transition){visibility:hidden}</style>
</head>
<body class="page-transition-active">
  <div id="page-transition" class="page-transition" role="status" aria-live="polite" aria-label="Загрузка">
    <div class="page-transition__inner">
      <div class="page-transition__logo"><img src="img/logo.svg" alt=""></div>
      <p class="page-transition__label">Коммерческая</p>
      <div class="page-transition__progress" aria-hidden="true"><span class="page-transition__progress-bar"></span></div>
    </div>
  </div>
  <script src="js/transition-boot.js"></script>

  <div id="site-header"></div>

  <main>
    <div class="page-header">
      <div class="container">
        <div class="breadcrumbs"><a href="index.html">Главная</a> / <span>Коммерческая</span></div>
        <h1>Коммерческая недвижимость</h1>
        <p>Офисы, торговые и другие коммерческие помещения</p>
      </div>
    </div>

    <div class="container page-layout">
      <aside class="filters-sidebar" id="filtersSidebar">
        <h3>Фильтры</h3>

        <div class="filter-group" id="areaFilterGroup">
          <label>Площадь, м²</label>
          <div class="filter-range-inputs">
            <input type="number" id="areaMin" placeholder="от" min="0" step="0.001">
            <input type="number" id="areaMax" placeholder="до" min="0" step="0.001">
          </div>
        </div>

        <div class="filter-group" id="flatTypeFilterGroup" style="display:none">
          <label>Тип квартир</label>
          <div class="filter-checkboxes" id="flatTypeFilters"></div>
        </div>

        <div class="filter-group">
          <label>Без наценки</label>
          <div class="filter-checkboxes" id="noMarkupFilters"></div>
        </div>

        <div class="filter-group">
          <label>Обязательный платёж, ₽/м²</label>
          <div class="filter-checkboxes" id="mandatoryPaymentFilters"></div>
        </div>

        <div class="filter-group">
          <label>Материнский капитал</label>
          <div class="filter-checkboxes" id="maternityCapitalFilters"></div>
        </div>

        <div class="filter-group">
          <label>Скидки</label>
          <div class="filter-checkboxes" id="discountsFilters"></div>
        </div>

        <div class="filter-group">
          <label>Срок сдачи</label>
          <div class="filter-checkboxes" id="deliveryDateFilters"></div>
        </div>

        <div class="filter-group">
          <label>Район</label>
          <div class="filter-checkboxes" id="districtFilters"></div>
        </div>

        <button class="btn btn-secondary btn-sm" id="resetFilters" style="width:100%;margin-top:8px">Сбросить фильтры</button>
      </aside>

      <div class="catalog-content">
        <div class="catalog-toolbar">
          <span class="results-count" id="resultsCount">Найдено: 0</span>
          <select id="sortSelect">
            <option value="default">Сортировка: по умолчанию</option>
            <option value="price-asc">Цена: по возрастанию</option>
            <option value="price-desc">Цена: по убыванию</option>
            <option value="area-asc">Площадь: по возрастанию</option>
            <option value="area-desc">Площадь: по убыванию</option>
            <option value="title">Название: А–Я</option>
          </select>
        </div>
        <div id="propertiesList"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js?v=49"></script>
  <script src="js/app.js"></script>
  <script src="js/transition.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/filters.js?v=47"></script>
  <script src="js/properties.js"></script>
  <script>
    initLayout('commercial');
    initCommercialPage();
  </script>
</body>
</html>
