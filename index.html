<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dune Base — Недвижимость</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="hero">
      <div class="container hero-content">
        <div class="hero-text">
          <h1>Недвижимость для <span class="highlight">жизни и бизнеса</span></h1>
          <p>Жилые и многофункциональные комплексы, коммерческие помещения с удобным управлением через админ-панель.</p>
          <div class="hero-buttons">
            <a href="complexes.html" class="btn btn-primary btn-lg">ЖК и МФК</a>
            <a href="commercial.html" class="btn btn-secondary btn-lg">Коммерция</a>
          </div>
        </div>
        <div class="hero-visual">
          <img src="img/logo.svg" alt="Dune Base">
        </div>
      </div>
    </section>

    <section class="section section-alt">
      <div class="container">
        <div class="section-header">
          <h2>Жилые комплексы</h2>
          <p id="homeStats">Загрузка...</p>
        </div>
        <div id="featuredJkProperties"></div>
        <div class="section-actions" id="homeJkActions">
          <button type="button" class="btn btn-secondary" id="toggleAllJkBtn" hidden>Показать все ЖК и МФК</button>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-header">
          <h2>Коммерческие помещения</h2>
          <p>Офисы, retail и помещения свободного назначения</p>
        </div>
        <div id="featuredCommercialProperties"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js?v=39"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/properties.js"></script>
  <script>
    initLayout('home');
    initHomePage();
  </script>
</body>
</html>
